<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" />
<title>Zorothax</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#060608; --fg:#fff; --muted:#9aa0a6; --dim:#6b7177; --accent:#ffd11a;
    --soft:#ffffff22; --soft2:#ffffff3d;
    --pixel:"Press Start 2P", monospace; --body:"VT323", "Courier New", monospace;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; color:var(--fg); font-family:var(--body); font-size:20px;
    background-color:var(--bg);
    background-image:
      radial-gradient(1px 1px at 20px 30px, #ffffff22 50%, transparent 50%),
      radial-gradient(1px 1px at 120px 90px, #ffffff1a 50%, transparent 50%),
      radial-gradient(1px 1px at 200px 160px, #ffffff22 50%, transparent 50%),
      radial-gradient(2px 2px at 300px 60px, #ffffff14 50%, transparent 50%),
      radial-gradient(1px 1px at 80px 220px, #ffffff1c 50%, transparent 50%);
    background-repeat:repeat; background-size:360px 280px; image-rendering:pixelated;
  }
  ::selection { background:#fff; color:#000; }
  .wrap { max-width:840px; margin:0 auto; padding:30px 26px 70px; }
  h1 { font-family:var(--pixel); font-size:20px; letter-spacing:2px; margin:0 0 12px; text-shadow:3px 3px 0 #000; }
  .sub { color:var(--muted); font-size:19px; margin:0 0 24px; }

  .box {
    position:relative; border:2px solid var(--soft); background:#0a0a0d; padding:20px; margin-bottom:16px;
    clip-path: polygon(0 8px,8px 8px,8px 0,calc(100% - 8px) 0,calc(100% - 8px) 8px,100% 8px,100% calc(100% - 8px),calc(100% - 8px) calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,8px calc(100% - 8px),0 calc(100% - 8px));
  }

  .tabs { display:flex; gap:4px; }
  .tab { font-family:var(--pixel); font-size:10px; letter-spacing:1px; padding:10px 16px; background:transparent; color:var(--dim); border:2px solid var(--soft); border-bottom:none; cursor:pointer; }
  .tab:hover { color:#fff; }
  .tab.active { color:var(--accent); border-color:var(--soft2); }

  .bar { display:flex; align-items:stretch; margin-top:2px; }
  .src { flex:1; display:flex; align-items:center; gap:10px; border:2px solid var(--fg); border-right:none; background:#0a0a0d; padding:15px 18px; min-width:0; cursor:pointer; transition:border-color .1s ease; }
  .src input { flex:1; min-width:0; border:none; outline:none; background:transparent; color:var(--fg); font-family:var(--body); font-size:22px; }
  .src .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:22px; }
  .src .name.ph { color:var(--dim); }
  .bar:focus-within .src { border-color:var(--accent); }

  .gen { font-family:var(--pixel); font-size:14px; letter-spacing:1px; padding:0 28px; background:var(--accent); color:#000; border:2px solid var(--accent); cursor:pointer; white-space:nowrap; }
  .gen:hover:not(:disabled) { background:#000; color:var(--accent); }
  .gen:disabled { background:#14151a; color:var(--dim); border-color:var(--soft); cursor:default; }

  .opts { display:flex; flex-wrap:wrap; gap:18px; align-items:flex-end; margin-top:18px; }
  .opt { display:flex; flex-direction:column; gap:8px; }
  .opt > span { font-family:var(--pixel); font-size:10px; letter-spacing:1px; color:var(--muted); }
  select, input[type=range] { background:#0a0a0d; color:var(--fg); border:2px solid var(--soft2); padding:8px 10px; font-family:var(--body); font-size:19px; min-width:170px; transition:border-color .1s ease; }
  select:hover, select:focus { outline:none; border-color:var(--accent); }
  input[type=range] { padding:0; accent-color:var(--accent); min-width:160px; }
  .check { flex-direction:row; align-items:center; gap:10px; }
  .check input { width:20px; height:20px; accent-color:var(--accent); }
  .check span { font-family:var(--pixel); font-size:11px; }

  .hint { font-family:var(--body); font-size:18px; color:var(--dim); margin:14px 0 0; }

  label.key span { font-family:var(--pixel); font-size:10px; letter-spacing:1px; color:var(--muted); }
  label.key input { width:100%; margin-top:10px; background:#0a0a0d; color:var(--fg); border:2px solid var(--soft2); padding:12px; font-family:var(--body); font-size:20px; transition:border-color .1s ease; }
  label.key input:focus { outline:none; border-color:var(--accent); }

  .prog { display:none; }
  .prog.show { display:block; }
  .progtop { display:flex; justify-content:space-between; font-family:var(--pixel); font-size:12px; letter-spacing:1px; color:var(--accent); margin-bottom:10px; }
  .track { height:18px; border:2px solid var(--fg); background:#0a0a0d; }
  .fill { height:100%; background:var(--accent); width:0%; transition:width .2s ease; }
  .stage { color:var(--muted); font-size:19px; margin-top:10px; }
  .msg { font-family:var(--body); font-size:18px; padding:12px; border:2px solid var(--soft2); margin-top:10px; }
  .msg.err { border-color:#ff6b6b; color:#ff8a8a; }
  .clip { border:2px solid var(--soft); padding:12px; margin-top:10px; }
  .clip .hook { font-family:var(--pixel); font-size:11px; line-height:1.6; }
  .clip .meta { color:var(--dim); font-size:18px; margin-top:6px; }
  .row { display:flex; gap:10px; margin-top:14px; }
  .btn2 { font-family:var(--pixel); font-size:11px; letter-spacing:1px; padding:12px 16px; background:#0a0a0d; color:var(--fg); border:2px solid var(--soft2); cursor:pointer; }
  .btn2:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ZOROTHAX</h1>
  <p class="sub">Cortes virais de gameplay — rodando no seu PC, com a sua chave.</p>

  <div class="box">
    <div class="tabs">
      <button class="tab active" data-mode="file">ESCOLHER ARQUIVO</button>
      <button class="tab" data-mode="link">COLAR LINK</button>
    </div>
    <div class="bar">
      <div class="src" id="srcFile">
        <span class="name ph" id="fileName">Escolha o vídeo do seu gameplay…</span>
      </div>
      <div class="src hidden" id="srcLink">
        <input id="linkInput" type="text" placeholder="Cole o link do YouTube, Drive ou .mp4…" />
      </div>
      <button class="gen" id="gen" disabled>✦ GERAR</button>
    </div>

    <div class="opts">
      <label class="opt"><span>LAYOUT</span>
        <select id="layout">
          <option value="facecam_top_gameplay_bottom">Facecam em cima + gameplay</option>
          <option value="dynamic_gameplay">Gameplay (segue a ação)</option>
          <option value="gameplay_blur">Tela cheia + fundo desfocado</option>
        </select>
      </label>
      <label class="opt"><span>DURAÇÃO</span>
        <select id="dur">
          <option value="15,90">Auto (15–90s)</option>
          <option value="10,40">Curtos (10–40s)</option>
          <option value="60,180">Longos (60–180s)</option>
        </select>
      </label>
      <label class="opt"><span>FACECAM</span>
        <select id="facecam">
          <option value="auto">Auto (rosto)</option>
          <option value="tr">Topo direita</option>
          <option value="tl">Topo esquerda</option>
          <option value="br">Baixo direita</option>
          <option value="bl">Baixo esquerda</option>
        </select>
      </label>
      <label class="opt"><span>Nº DE CORTES: <b id="clipsN">3</b></span>
        <input id="clips" type="range" min="1" max="10" value="3" />
      </label>
      <label class="opt check"><input id="captions" type="checkbox" checked /><span>Legenda karaokê</span></label>
    </div>
    <p class="hint">ⓘ Processa local (rápido). YouTube funciona aqui — é o seu IP residencial.</p>
  </div>

  <div class="box">
    <label class="key"><span>CHAVE DA OPENROUTER (fica só no seu PC)</span>
      <input id="key" type="password" placeholder="sk-or-..." />
    </label>
  </div>

  <div class="box prog" id="prog">
    <div class="progtop"><span id="pstate">PROCESSANDO</span><span id="ppct">0%</span></div>
    <div class="track"><div class="fill" id="pfill"></div></div>
    <div class="stage" id="pstage">…</div>
    <div id="result"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
