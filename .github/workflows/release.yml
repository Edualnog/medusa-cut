name: release

# Builda os instaladores nativos por plataforma e publica UMA release NESTE mesmo
# repo (Edualnog/medusa-clip) — código source-available, público.
# Dispara ao empurrar uma tag de versão (ex.: git tag v0.1.7 && git push --tags).
#
# Desenho à prova de corrida: os jobs `build` NÃO publicam — cada um sobe seus
# arquivos como artifact. O job `release` (depois de TODOS) baixa tudo e cria a
# release de uma vez só. Assim nunca acontece de um runner publicar parcial enquanto
# outro ainda está subindo (bug que deixava o release sem o Windows).
#
# NÃO há cross-compile: cada artefato é buildado no seu próprio SO/arquitetura.
# Sem PAT: a release sai NESTE mesmo repo via GITHUB_TOKEN nativo
# (precisa de `permissions: contents: write` no job release — já configurado).
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14      # Apple Silicon -> arm64
          - os: windows-latest # x64
          - os: ubuntu-latest  # x64 (AppImage x86_64)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11" # stack ML (ctranslate2/faster-whisper) tem wheels p/ 3.11

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instala deps do desktop
        working-directory: desktop
        run: npm install

      - name: Build do instalador (sem publicar)
        working-directory: desktop
        shell: bash
        env:
          PYTHON: python # setup-python expõe 3.11 como `python`
          PUBLISH: never # NÃO publica aqui; o job `release` faz isso de uma vez
        run: bash scripts/build_app.sh

      - name: Sobe os artefatos (instalador + feed do updater)
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.blockmap
            desktop/dist/latest*.yml
          if-no-files-found: error
          retention-days: 2

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GITHUB_TOKEN cria a release neste mesmo repo
    steps:
      - name: Baixa todos os artefatos num lugar só
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publica a release única (todos os assets de uma vez)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo Edualnog/medusa-clip \
            --title "Medusa Clip ${GITHUB_REF_NAME}" \
            --notes "Instaladores do Medusa Clip ${GITHUB_REF_NAME} (macOS Apple Silicon, Windows, Linux). App gratuito." \
            --latest \
            dist/*
